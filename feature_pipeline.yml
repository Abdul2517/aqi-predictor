name: Feature Pipeline

# WHY these triggers:
#   - schedule: runs automatically every hour, as required by the project spec
#   - workflow_dispatch: lets you manually trigger a run from the GitHub UI,
#     which is essential for testing before you trust the schedule
on:
  schedule:
    - cron: "0 * * * *"   # every hour, at minute 0 (UTC)
  workflow_dispatch: {}

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest   # Linux runner -> avoids the Windows Kerberos/delta-rs issue entirely

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feature pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT_NAME: ${{ secrets.HOPSWORKS_PROJECT_NAME }}
          HOPSWORKS_HOST: ${{ secrets.HOPSWORKS_HOST }}
          CITY_NAME: ${{ secrets.CITY_NAME }}
          CITY_LAT: ${{ secrets.CITY_LAT }}
          CITY_LON: ${{ secrets.CITY_LON }}
        run: python feature_pipeline.py
